version: '3.9'

networks:
  lion-net:
    driver: bridge

volumes:
  postgres_data:
  timescale_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  ml_models_data:

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market_lion
      POSTGRES_USER: ${PG_USER:-lion}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-lion_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-lion} -d market_lion"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: market_lion_ts
      POSTGRES_USER: ${PG_USER:-lion}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-lion_secret_2024}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/sql/timescale_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-lion} -d market_lion_ts"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-lion}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-lion_secret_2024}
      MONGO_INITDB_DATABASE: market_lion_news
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js
    ports:
      - "27017:27017"
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-lion_redis_2024} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lion_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper: {condition: service_healthy}
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Backend Services ─────────────────────────────────────────────────────
  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - POSTGRES_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@postgres:5432/market_lion
      - TIMESCALE_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@timescaledb:5432/market_lion_ts
      - MONGO_URL=mongodb://${MONGO_USER:-lion}:${MONGO_PASSWORD:-lion_secret_2024}@mongodb:27017/market_lion_news
      - KAFKA_BOOTSTRAP=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://marketlion.ai}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-demo}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - NEWS_SVC_URL=http://news_ingestion_service:8007
      - ML_SVC_URL=http://ai_ml_service:8008
      - PATTERNS_SVC_URL=http://patterns_service:8009
      - PA_SVC_URL=http://price_action_service:8010
      - USER_SVC_URL=http://user_service:8011
      - WHALE_SVC_URL=http://whale_tracker_service:8012
      - RISK_SVC_URL=http://risk_manager_service:8013
      - NOTIF_SVC_URL=http://notification_service:8014
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./backend
      dockerfile: services/auth_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@postgres:5432/market_lion
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/1
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - TWILIO_SID=${TWILIO_SID:-}
      - TWILIO_TOKEN=${TWILIO_TOKEN:-}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  market_data_service:
    build:
      context: ./backend
      dockerfile: services/market_data_service/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - TIMESCALE_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@timescaledb:5432/market_lion_ts
      - KAFKA_BOOTSTRAP=kafka:9092
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-demo}
      - TWELVE_DATA_KEY=${TWELVE_DATA_KEY:-}
      - POLYGON_KEY=${POLYGON_KEY:-}
    depends_on:
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  technical_service:
    build:
      context: ./backend
      dockerfile: services/technical_analysis_service/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  fundamental_service:
    build:
      context: ./backend
      dockerfile: services/fundamental_data_service/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - MONGO_URL=mongodb://${MONGO_USER:-lion}:${MONGO_PASSWORD:-lion_secret_2024}@mongodb:27017/market_lion_news
      - KAFKA_BOOTSTRAP=kafka:9092
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
    depends_on:
      redis: {condition: service_healthy}
      mongodb: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  vote_engine_service:
    build:
      context: ./backend
      dockerfile: services/vote_engine_service/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  risk_manager_service:
    build:
      context: ./backend
      dockerfile: services/risk_manager_service/Dockerfile
    ports:
      - "8013:8013"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - POSTGRES_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@postgres:5432/market_lion
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification_service:
    build:
      context: ./backend
      dockerfile: services/notification_service/Dockerfile
    ports:
      - "8014:8014"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/2
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY:-}
      - TWILIO_SID=${TWILIO_SID:-}
      - TWILIO_TOKEN=${TWILIO_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
    depends_on:
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  order_execution_service:
    build:
      context: ./backend
      dockerfile: services/order_execution_service/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - POSTGRES_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@postgres:5432/market_lion
      - KAFKA_BOOTSTRAP=kafka:9092
      - METAAPI_TOKEN=${METAAPI_TOKEN:-}
      - CAPITAL_COM_API_KEY=${CAPITAL_COM_API_KEY:-}
      - CAPITAL_COM_PASSWORD=${CAPITAL_COM_PASSWORD:-}
      - EXNESS_LOGIN=${EXNESS_LOGIN:-}
      - EXNESS_PASSWORD=${EXNESS_PASSWORD:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  nlp_engine_service:
    build:
      context: ./backend
      dockerfile: services/nlp_engine_service/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/0
      - MONGO_URL=mongodb://${MONGO_USER:-lion}:${MONGO_PASSWORD:-lion_secret_2024}@mongodb:27017/market_lion_news
      - KAFKA_BOOTSTRAP=kafka:9092
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - TWITTER_BEARER=${TWITTER_BEARER:-}
    depends_on:
      redis: {condition: service_healthy}
      mongodb: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped


  backtesting_service:
    build:
      context: ./backend
      dockerfile: services/backtesting_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - TIMESCALE_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@timescaledb:5432/market_lion_ts
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/3
    depends_on:
      timescaledb: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  # ─── Phase-2 Services ─────────────────────────────────────────────────────
  news_ingestion_service:
    build:
      context: ./backend/services/news_ingestion_service
      dockerfile: Dockerfile
    environment:
      - MONGO_URL=mongodb://${MONGO_USER:-lion}:${MONGO_PASSWORD:-lion_secret_2024}@mongodb:27017/market_lion_news
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/7
    depends_on:
      mongodb: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped

  ai_ml_service:
    build:
      context: ./backend/services/ai_ml_service
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/3
      - ML_MODEL_PATH=/app/models
    volumes:
      - ml_models_data:/app/models
    ports:
      - "8008:8008"
    depends_on:
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  patterns_service:
    build:
      context: ./backend/services/patterns_service
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/4
    ports:
      - "8009:8009"
    depends_on:
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  price_action_service:
    build:
      context: ./backend/services/price_action_service
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/5
    ports:
      - "8010:8010"
    depends_on:
      redis: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  user_service:
    build:
      context: ./backend/services/user_service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${PG_USER:-lion}:${PG_PASSWORD:-lion_secret_2024}@postgres:5432/market_lion
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8011:8011"
    depends_on:
      postgres: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  whale_tracker_service:
    build:
      context: ./backend/services/whale_tracker_service
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-lion_redis_2024}@redis:6379/6
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GLASSNODE_API_KEY=${GLASSNODE_API_KEY:-}
    ports:
      - "8012:8012"
    depends_on:
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - NEXT_PUBLIC_AUTH_URL=${NEXT_PUBLIC_AUTH_URL:-http://localhost:8001}
    depends_on:
      gateway: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ─── Monitoring ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [lion-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-lion_grafana_2024}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [lion-net]
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      gateway: {condition: service_healthy}
      frontend: {condition: service_healthy}
    networks: [lion-net]
    restart: unless-stopped
